# H2 In-Memory Database Configuration (No installation required)
spring.datasource.url=jdbc:h2:mem:payroll_db;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Enable H2 Console (Optional, can access at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Initialize schema automatically
spring.sql.init.mode=always

# Static resources mapping
spring.mvc.static-path-pattern=/**

